<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <circle cx="60" cy="60" r="60" fill="#5B7A5E"/>
  <!-- Book 1 (tallest, left) -->
  <rect x="28" y="28" width="14" height="64" rx="2" fill="#fff" opacity="0.9"/>
  <rect x="30" y="32" width="10" height="2" rx="1" fill="#5B7A5E" opacity="0.5"/>
  <rect x="30" y="38" width="10" height="1" rx="0.5" fill="#5B7A5E" opacity="0.3"/>
  <rect x="30" y="42" width="10" height="1" rx="0.5" fill="#5B7A5E" opacity="0.3"/>
  <!-- Book 2 -->
  <rect x="44" y="36" width="14" height="56" rx="2" fill="#fff" opacity="0.8"/>
  <rect x="46" y="40" width="10" height="2" rx="1" fill="#5B7A5E" opacity="0.5"/>
  <rect x="46" y="46" width="10" height="1" rx="0.5" fill="#5B7A5E" opacity="0.3"/>
  <!-- Book 3 (tilted slightly) -->
  <rect x="60" y="32" width="14" height="60" rx="2" fill="#fff" opacity="0.85" transform="rotate(3 67 62)"/>
  <rect x="62" y="36" width="10" height="2" rx="1" fill="#5B7A5E" opacity="0.5" transform="rotate(3 67 37)"/>
  <!-- Book 4 (shorter) -->
  <rect x="76" y="42" width="14" height="50" rx="2" fill="#fff" opacity="0.75"/>
  <rect x="78" y="46" width="10" height="2" rx="1" fill="#5B7A5E" opacity="0.5"/>
  <rect x="78" y="52" width="10" height="1" rx="0.5" fill="#5B7A5E" opacity="0.3"/>
</svg>
